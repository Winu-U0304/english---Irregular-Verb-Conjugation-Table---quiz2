<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="英語の不規則動詞変化暗記サイトです。このサイトで覚えていきましょう！！AAA型やABC型など、パターン別に暗記モードと記入モードでサクサク勉強できます！ぜひ見てみてください！ウィーヌ不規則動詞変化暗記サイト英語です。"><meta name="google-site-verification" content="vNgRrpb3UvoY39B0QklxDmnc73egTqjaeguz7IusimM" /><link rel="icon" href="英語.png"><title>不規則動詞変化クイズ2</title><script async src="https://googletagmanager.com"></script><script>window.dataLayer = window.dataLayer || [];function gtag(){dataLayer.push(arguments);}gtag('js', new Date());gtag('config', 'G-XXXXXXXXXX');</script><style>:root { --primary-color: #007bff; --bg-color: #f8f9fa; --border-color: #dee2e6; }body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; color: #333; }.container { max-width: 900px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; border: 4px solid var(--primary-color); box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }h1 { text-align: center; font-size: 20px; margin-bottom: 5px; color: var(--primary-color); }.description { text-align: center; font-size: 13px; color: #666; margin-bottom: 15px; }.mode-select, .type-select { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }.mode-btn, .type-btn { padding: 8px 12px; font-size: 13px; background: #fff; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; }.mode-btn { border: 2px solid var(--primary-color); color: var(--primary-color); }.mode-btn.active { background: var(--primary-color); color: #fff; }.type-btn { border: 2px solid #6c757d; color: #6c757d; }.type-btn.active { background: #6c757d; color: #fff; }.table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }table { width: 100%; min-width: 500px; border-collapse: collapse; margin-top: 10px; margin-bottom: 15px; }th, td { border: 1px solid var(--border-color); padding: 10px 5px; text-align: center; font-size: 14px; }th { background-color: #e9ecef; }th:nth-child(1), td:nth-child(1) { width: 28%; font-size: 13px; }th:not(:nth-child(1)), td:not(:nth-child(1)) { width: 24%; }.tape-container { position: relative; display: inline-block; width: 90%; max-width: 120px; height: 26px; line-height: 26px; vertical-align: middle; }.tape-text { display: block; width: 100%; height: 100%; font-weight: bold; }.tape { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #212529; cursor: pointer; border-radius: 3px; transition: opacity 0.15s ease; opacity: 1; }.tape.reveal { opacity: 0; }.quiz-input { width: 90%; max-width: 120px; padding: 4px; border: 1px solid var(--border-color); border-radius: 4px; text-align: center; font-size: 14px; box-sizing: border-box; }.quiz-input.correct { background-color: #d4edda; border-color: #c3e6cb; color: #155724; font-weight: bold; }.quiz-input.incorrect { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; font-weight: bold; }.action-btns { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }.action-btn { padding: 10px 20px; font-size: 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }.submit-btn { background-color: #28a745; color: white; }.reset-btn { background-color: #6c757d; color: white; }.qa-container { background: #f1f3f5; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); margin: 15px 0; text-align: center; }.qa-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #495057; }.qa-question { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #111; }.qa-options { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto; }.qa-opt-btn { width: 100%; padding: 12px; background: #fff; border: 2px solid var(--border-color); border-radius: 6px; font-size: 15px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.2s; }.qa-opt-btn:hover { background: #e9ecef; }.qa-opt-btn.correct { background: #d4edda; border-color: #c3e6cb; color: #155724; pointer-events: none; }.qa-opt-btn.incorrect { background: #f8d7da; border-color: #f5c6cb; color: #721c24; pointer-events: none; }.qa-opt-btn.disabled { pointer-events: none; opacity: 0.6; }.qa-feedback { margin-top: 15px; font-size: 14px; font-weight: bold; padding: 12px; border-radius: 6px; text-align: left; line-height: 1.5; }.qa-feedback.correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }.qa-feedback.incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }.qa-next-btn { display: inline-block; margin-top: 15px; padding: 10px 25px; background: var(--primary-color); color: white; border: none; border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; }.qa-next-btn:hover { background: #0056b3; }.scroll-to-top-btn{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background-color:#ffffff;color:#333333;border:2px solid #dee2e6;font-size:18px;cursor:pointer;box-shadow:0 4px 6px rgba(0,0,0,0.05);z-index:9999;display:flex;align-items:center;justify-content:center;transition:transform 0.2s ease,opacity 0.3s ease,visibility 0.3s ease;opacity:0;visibility:hidden;}.scroll-to-top-btn:hover{transform:scale(1.1);background-color:#f8f9fa;}.scroll-to-top-btn.show{opacity:1;visibility:visible;}footer { text-align: center; padding: 20px 10px; margin-top: 40px; background-color: #f8f9fa; border-top: 1px solid #e9ecef; } footer a { color: #007bff; text-decoration: none; font-weight: bold; font-size: 14px; transition: color 0.2s; } footer a:hover { color: #0056b3; text-decoration: underline; }</style></head><body><div class="container"><h1>不規則動詞変化 クイズ2</h1><div class="description">不規則動詞の変化を覚えましょう。モードを選んでテストを開始してください。</div><div class="type-select"><button id="type-aaa" class="type-btn active" onclick="switchType('aaa')">A・A・A型</button><button id="type-aba" class="type-btn" onclick="switchType('aba')">A・B・A型</button><button id="type-abb" class="type-btn" onclick="switchType('abb')">A・B・B型</button><button id="type-abc" class="type-btn" onclick="switchType('abc')">A・B・C型</button></div><div class="mode-select"><button id="mode-memo" class="mode-btn active" onclick="switchMode('memorize')">暗記モード</button><button id="mode-write" class="mode-btn" onclick="switchMode('write')">記入モード</button><button id="mode-table" class="mode-btn" onclick="switchMode('table')">不規則動詞変化表</button><button id="mode-question" class="mode-btn" onclick="switchMode('question')">問題！</button></div><div id="normal-table-area" class="table-container"><table id="verbs-table"><thead><tr><th>意味</th><th>現在形</th><th>過去形</th><th>過去分詞形</th></tr></thead><tbody id="verbs-body"></tbody></table></div><div id="question-mode-area" class="qa-container" style="display: none;"><div class="qa-title" id="qa-mode-title"></div><div class="qa-question" id="qa-question-text"></div><div class="qa-options" id="qa-options-box"></div><div id="qa-feedback-box"></div></div><div class="action-btns"><button id="submit-btn" class="action-btn submit-btn" style="display:none;" onclick="checkAnswers()">答え合わせをします</button><button id="reset-btn" class="action-btn reset-btn" onclick="resetQuiz()">やり直します</button></div></div><script>const verbData = { aaa: [{ meaning: "どきどきする", root: "beat", past: "beat", ppart: "beat" }, { meaning: "切る", root: "cut", past: "cut", ppart: "cut" }, { meaning: "傷つける", root: "hurt", past: "hurt", ppart: "hurt" }, { meaning: "置く", root: "put", past: "put", ppart: "put" }, { meaning: "読む", root: "read", past: "read", ppart: "read" }, { meaning: "配置する", root: "set", past: "set", ppart: "set" }, { meaning: "広げる", root: "spread", past: "spread", ppart: "spread" }], aba: [{ meaning: "…になる", root: "become", past: "became", ppart: "become" }, { meaning: "来る", root: "come", past: "came", ppart: "come" }, { meaning: "走る", root: "run", past: "ran", ppart: "run" }],

abb: [{ meaning: "持ってくる", root: "bring", past: "brought", ppart: "brought" }, { meaning: "建てる", root: "build", past: "built", ppart: "built" }, { meaning: "買う", root: "buy", past: "bought", ppart: "bought" }, { meaning: "捕まえる", root: "catch", past: "caught", ppart: "caught" }, { meaning: "感じる", root: "feel", past: "felt", ppart: "felt" }, { meaning: "見つける", root: "find", past: "found", ppart: "found" }, { meaning: "忘れる", root: "forget", past: "forgot", ppart: "forgot" }, { meaning: "得る", root: "get", past: "got", ppart: "got" }, { meaning: "持っている", root: "have", past: "had", ppart: "had" }, { meaning: "聞く", root: "hear", past: "heard", ppart: "heard" }, { meaning: "保つ", root: "keep", past: "kept", ppart: "kept" }, { meaning: "出発する", root: "leave", past: "left", ppart: "left" }, { meaning: "失う", root: "lose", past: "lost", ppart: "lost" }, { meaning: "作る", root: "make", past: "made", ppart: "made" }, { meaning: "意味する", root: "mean", past: "meant", ppart: "meant" }, { meaning: "会う", root: "meet", past: "met", ppart: "met" }, { meaning: "払う", root: "pay", past: "paid", ppart: "paid" }, { meaning: "言う", root: "say", past: "said", ppart: "said" }, { meaning: "売る", root: "sell", past: "sold", ppart: "sold" }, { meaning: "おくる", root: "send", past: "sent", ppart: "sent" }, { meaning: "すわる", root: "sit", past: "sat", ppart: "sat" }, { meaning: "過ごす", root: "spend", past: "spent", ppart: "spent" }, { meaning: "立っている", root: "stand", past: "stood", ppart: "stood" }, { meaning: "教える", root: "teach", past: "taught", ppart: "taught" }, { meaning: "話す、教える", root: "tell", past: "told", ppart: "told" }, { meaning: "思う", root: "think", past: "thought", ppart: "thought" }, { meaning: "理解する", root: "understand", past: "understood", ppart: "understood" }, { meaning: "勝つ", root: "win", past: "won", ppart: "won" }], abc: [{ meaning: "…である", root: "am / is / are", past: "was / were", ppart: "been" }, { meaning: "始める", root: "begin", past: "began", ppart: "begun" }, { meaning: "破る", root: "break", past: "broke", ppart: "broken" }, { meaning: "選ぶ", root: "choose", past: "chose", ppart: "chosen" }, { meaning: "する", root: "do", past: "did", ppart: "done" }, { meaning: "かく", root: "draw", past: "drew", ppart: "drawn" }, { meaning: "飲む", root: "drink", past: "drank", ppart: "drunk" }, { meaning: "食べる", root: "eat", past: "ate", ppart: "eaten" }, { meaning: "落ちる", root: "fall", past: "fell", ppart: "fallen" }, { meaning: "与える", root: "give", past: "gave", ppart: "given" }, { meaning: "行く", root: "go", past: "went", ppart: "gone" }, { meaning: "…になる", root: "grow", past: "grew", ppart: "grown" }, { meaning: "知っている", root: "know", past: "knew", ppart: "known" }, { meaning: "乗る", root: "ride", past: "rode", ppart: "ridden" }, { meaning: "のぼる", root: "rise", past: "rose", ppart: "risen" }, { meaning: "見る", root: "see", past: "saw", ppart: "seen" }, { meaning: "見せる", root: "show", past: "showed", ppart: "shown" }, { meaning: "歌う", root: "sing", past: "sang", ppart: "sung" }, { meaning: "話す", root: "speak", past: "spoke", ppart: "spoken" }, { meaning: "泳ぐ", root: "swim", past: "swam", ppart: "swum" }, { meaning: "持っていく", root: "take", past: "took", ppart: "taken" }, { meaning: "目が覚める", root: "wake", past: "woke", ppart: "woken" }, { meaning: "書く", root: "write", past: "wrote", ppart: "written" }] };

let currentMode = 'memorize'; let currentType = 'aaa'; let currentQuestionVerb = null; function renderTable() { if (currentMode === 'question') return; const tbody = document.getElementById('verbs-body'); tbody.innerHTML = ''; const list = verbData[currentType]; list.forEach((verb) => { const tr = document.createElement('tr'); if (currentMode === 'memorize') { tr.innerHTML = `<td><b>${verb.meaning}</b></td><td><div class="tape-container"><span class="tape-text">${verb.root}</span><div class="tape" onclick="toggleTape(this)"></div></div></td><td><div class="tape-container"><span class="tape-text">${verb.past}</span><div class="tape" onclick="toggleTape(this)"></div></div></td><td><div class="tape-container"><span class="tape-text">${verb.ppart}</span><div class="tape" onclick="toggleTape(this)"></div></div></td>`; } else if (currentMode === 'write') { tr.innerHTML = `<td><b>${verb.meaning}</b></td><td><input type="text" class="quiz-input" data-ans="${verb.root}"></td><td><input type="text" class="quiz-input" data-ans="${verb.past}"></td><td><input type="text" class="quiz-input" data-ans="${verb.ppart}"></td>`; } else { tr.innerHTML = `<td><b>${verb.meaning}</b></td><td><span class="tape-text" style="color:#007bff;">${verb.root}</span></td><td><span class="tape-text" style="color:#007bff;">${verb.past}</span></td><td><span class="tape-text" style="color:#007bff;">${verb.ppart}</span></td>`; } tbody.appendChild(tr); }); } function switchMode(mode) { currentMode = mode; document.getElementById('mode-memo').classList.remove('active'); document.getElementById('mode-write').classList.remove('active'); document.getElementById('mode-table').classList.remove('active'); document.getElementById('mode-question').classList.remove('active'); const targetId = mode === 'memorize' ? 'memo' : mode === 'write' ? 'write' : mode === 'table' ? 'table' : 'question'; document.getElementById('mode-' + targetId).classList.add('active'); if(mode === 'write') { document.getElementById('normal-table-area').style.display = 'block'; document.getElementById('question-mode-area').style.display = 'none'; document.getElementById('submit-btn').style.display = 'block'; document.getElementById('reset-btn').style.display = 'block'; renderTable(); } else if (mode === 'memorize') { document.getElementById('normal-table-area').style.display = 'block'; document.getElementById('question-mode-area').style.display = 'none'; document.getElementById('submit-btn').style.display = 'none'; document.getElementById('reset-btn').style.display = 'block'; renderTable(); } else if (mode === 'table') { document.getElementById('normal-table-area').style.display = 'block'; document.getElementById('question-mode-area').style.display = 'none'; document.getElementById('submit-btn').style.display = 'none'; document.getElementById('reset-btn').style.display = 'none'; renderTable(); } else if (mode === 'question') { document.getElementById('normal-table-area').style.display = 'none'; document.getElementById('question-mode-area').style.display = 'block'; document.getElementById('submit-btn').style.display = 'none'; document.getElementById('reset-btn').style.display = 'none'; generateQuestion(); } } function switchType(type) { currentType = type; document.getElementById('type-aaa').classList.remove('active'); document.getElementById('type-aba').classList.remove('active'); document.getElementById('type-abb').classList.remove('active'); document.getElementById('type-abc').classList.remove('active'); document.getElementById('type-' + type).classList.add('active'); if (currentMode === 'question') { generateQuestion(); } else { renderTable(); } } function toggleTape(element) { element.classList.toggle('reveal'); }function checkAnswers(){const inputs=document.querySelectorAll('.quiz-input');inputs.forEach(input=>{const userAnswer=input.value.trim().toLowerCase();const correctAnswerRaw=input.getAttribute('data-ans').toLowerCase();const correctAnswers=correctAnswerRaw.split('/').map(ans=>ans.trim());if(correctAnswers.includes(userAnswer)||userAnswer===correctAnswerRaw.replace(/\s+/g,'')||(correctAnswerRaw.includes('am / is / are')&&userAnswer==='be')){input.className="quiz-input correct";}else{input.className="quiz-input incorrect";}});}
 function resetQuiz() { renderTable(); } function generateQuestion() { const list = verbData[currentType]; const feedbackBox = document.getElementById('qa-feedback-box'); feedbackBox.innerHTML = ''; if (!list || list.length === 0) return; const randomIndex = Math.floor(Math.random() * list.length); const verb = list[randomIndex]; currentQuestionVerb = verb; const typeLabel = currentType.toUpperCase() + '型'; document.getElementById('qa-mode-title').innerText = `【単発クイズ - ${typeLabel}パターン】`; document.getElementById('qa-question-text').innerText = `「${verb.meaning}」を意味する動詞の、過去形と過去分詞形の正しい組み合わせを選んでください。`; const correctAnswerText = `${verb.past} - ${verb.ppart}`; const optionsSet = new Set([correctAnswerText]); while (optionsSet.size < 4) { const dummyVerb1 = list[Math.floor(Math.random() * list.length)]; const dummyVerb2 = list[Math.floor(Math.random() * list.length)]; const dummyPatterns = [`${dummyVerb1.past} - ${dummyVerb1.past}`, `${dummyVerb1.root} - ${dummyVerb2.ppart}`, `${verb.past} - ${dummyVerb1.ppart}`, `${verb.root} - ${verb.past}`, `${verb.ppart} - ${verb.past}`]; const chosenDummy = dummyPatterns[Math.floor(Math.random() * dummyPatterns.length)]; if (chosenDummy !== correctAnswerText) { optionsSet.add(chosenDummy); } } const optionsArray = Array.from(optionsSet).sort(() => Math.random() - 0.5); const optionsBox = document.getElementById('qa-options-box'); optionsBox.innerHTML = ''; optionsArray.forEach(optionText => { const btn = document.createElement('button'); btn.className = 'qa-opt-btn'; btn.innerText = optionText; btn.onclick = () => selectQuestionAnswer(btn, optionText, correctAnswerText); optionsBox.appendChild(btn); }); } function selectQuestionAnswer(clickedBtn, selectedText, correctText) { const buttons = document.querySelectorAll('.qa-opt-btn'); const feedbackBox = document.getElementById('qa-feedback-box'); buttons.forEach(btn => { btn.classList.add('disabled'); if (btn.innerText === correctText) { btn.classList.add('correct'); } }); if (selectedText === correctText) { clickedBtn.classList.add('correct'); feedbackBox.className = 'qa-feedback correct'; feedbackBox.innerHTML = `<strong>⭕ 正解</strong><br>「${currentQuestionVerb.meaning}」の活用は、原形: <strong>${currentQuestionVerb.root}</strong>、過去形: <strong>${currentQuestionVerb.past}</strong>、過去分詞形: <strong>${currentQuestionVerb.ppart}</strong> となります。<br>次の問題を押して次へ進む`; } else { clickedBtn.classList.add('incorrect'); feedbackBox.className = 'qa-feedback incorrect'; feedbackBox.innerHTML = `<strong>❌ 不正解</strong><br>正解は「<strong>${correctText}</strong>」です。<br>「${currentQuestionVerb.meaning}」の正しい変化は [ <strong>${currentQuestionVerb.root} - ${currentQuestionVerb.past} - ${currentQuestionVerb.ppart}</strong> ] です。<br> `; } const nextBtn = document.createElement('button'); nextBtn.className = 'qa-next-btn'; nextBtn.innerText = '次の問題へ進む'; nextBtn.onclick = generateQuestion; feedbackBox.appendChild(document.createElement('br')); feedbackBox.appendChild(nextBtn); } renderTable();window.addEventListener('scroll',()=>{const btn=document.getElementById('scrollTopBtn');if(window.scrollY>200){btn.classList.add('show');}else{btn.classList.remove('show');}});</script><button id="scrollTopBtn" class="scroll-to-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'});">▲</button><footer><p><a href="https://winu-u0304.github.io/List-of-Memorization-Websites/" target="_blank" rel="noopener noreferrer">暗記サイト表に戻る</a></p></footer></body></html>
